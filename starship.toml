# Get editor completions based on the config schema
"$schema" = 'https://starship.rs/config-schema.json'

format = "$directory${custom.jj}$git_metrics$bun$nodejs$golang\n$character"

# Inserts a blank line between shell prompts
add_newline = false

# Replace the '❯' symbol in the prompt with '➜'
[character] # The name of the module we are configuring is 'character'
success_symbol = '[→](bold green)' # The 'success_symbol' segment is being set to '➜' with the color 'bold green'
error_symbol = '[→](bold red)'

[nodejs]
format = '[$symbol($version)]($style) '
style = 'green'
symbol = 'Node '

[bun]
format = '[$symbol($version)]($style) '
style = 'purple'
symbol = 'Bun '

[directory]
style = 'cyan'
truncation_length = 1
fish_style_pwd_dir_length = 1

[git_metrics]
disabled = false
added_style = 'underline green'
deleted_style = 'underline red'

[golang]
symbol = 'Go '
style = 'blue'
format = '[$symbol($version)]($style) '

[custom.jj]
description = "The status of jujutsu"
when = '''
# Check if we're in a jj repository by looking for .jj folder in current or parent directories
dir="$PWD"
while [ "$dir" != "/" ]; do
  if [ -d "$dir/.jj" ]; then
    exit 0
  fi
  dir=$(dirname "$dir")
done
exit 1
'''
format = '[$output]($style) '
style = ''
shell = 'bash'
ignore_timeout = true
command = '''
status=$(jj st --no-pager 2>/dev/null)

base_info=$(jj log --no-graph -r 'heads(first_ancestors(@) & bookmarks())' -T 'commit_id ++ "\t" ++ local_bookmarks.map(|b| b.name()).join(",") ++ "\n"' 2>/dev/null | head -n1)

if [ -n "$base_info" ]; then
  base_rev=$(printf '%s' "$base_info" | cut -f1)
  base_names=$(printf '%s' "$base_info" | cut -f2-)
  always_show_ahead=false
else
  base_rev='root()'
  base_names='root'
  always_show_ahead=true
fi

ahead_count=$(jj log -r "${base_rev}..@ & ~empty() & (~description('') | @)" --count 2>/dev/null)
case "$ahead_count" in
  ''|*[!0-9]*) ahead_count=0 ;;
esac

base_segment="${base_names}"
if [ "$ahead_count" -gt 0 ] || [ "$always_show_ahead" = true ]; then
  base_segment="${base_segment}+${ahead_count}"
fi
base_segment="\033[37m${base_segment}\033[0m"

# Check if working copy is clean
if echo "$status" | grep -q "The working copy has no changes"; then
  printf '%b' "$base_segment"
else
  # Parse the working copy changes section
  changes=$(echo "$status" | sed -n '/Working copy changes:/,/Working copy/p' | grep "^[AMDR] ")
  
  # Count files for each status in single pass
  counts=$(echo "$changes" | awk '/^A / {a++} /^M / {m++} /^D / {d++} /^R / {r++} END {print (a+0)" "(m+0)" "(d+0)" "(r+0)}')
  read added_count modified_count deleted_count renamed_count <<< "$counts"
  
  # Build colored output
  colored=""
  if [ "$added_count" -gt 0 ]; then
    colored="${colored}\033[4;32mA${added_count}\033[0m"
  fi
  
  if [ "$modified_count" -gt 0 ]; then
    colored="${colored} \033[4;33mM${modified_count}\033[0m"
  fi
  
  if [ "$deleted_count" -gt 0 ]; then
    colored="${colored} \033[4;31mD${deleted_count}\033[0m"
  fi
  
  if [ "$renamed_count" -gt 0 ]; then
    colored="${colored} \033[4;35m→${renamed_count}\033[0m"
  fi
  
  if [ -n "$colored" ]; then
    printf '%b' "$base_segment ${colored# }"
  else
    printf '%b' "$base_segment"
  fi
fi
'''
